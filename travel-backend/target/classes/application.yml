server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456789Phy

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus 配置（ORM框架）
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.travel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 高德地图配置
amap:
  key:a8e876f582faea150ecd701a9c5dce19

# JWT配置
jwt:
  secret: travel-platform-secret-key-2024-secure-token-256bit
#  过期时间（24小时，单位毫秒）
  expiration: 86400000

# 文件上传相对路径
file:
  upload-path: /uploads/

# 支付宝沙箱支付配置
alipay:
  app-id: "9021000162646195"
  private-key: 
  public-key: 
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  notify-url: http://localhost:8080/api/pay/alipay/notify
  return-url: http://localhost:3001/pay/success
